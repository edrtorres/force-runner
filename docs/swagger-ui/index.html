<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Force Runner API Docs</title>
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5.17.14/swagger-ui.css" />
    <style>
      body {
        margin: 0;
        background: #f6f8fa;
      }

      .topbar {
        display: none;
      }

      .copy-full-url {
        margin-left: auto;
        margin-right: 12px;
        border: 1px solid #94a3b8;
        border-radius: 4px;
        background: #ffffff;
        color: #334155;
        cursor: pointer;
        font-size: 12px;
        font-weight: 700;
        padding: 5px 8px;
      }

      .copy-full-url:hover {
        background: #f1f5f9;
      }

      .copy-full-url.copied {
        border-color: #16a34a;
        color: #16a34a;
      }
    </style>
  </head>
  <body>
    <div id="swagger-ui"></div>
    <script src="https://unpkg.com/swagger-ui-dist@5.17.14/swagger-ui-bundle.js"></script>
    <script src="https://unpkg.com/swagger-ui-dist@5.17.14/swagger-ui-standalone-preset.js"></script>
    <script>
      window.onload = function () {
        window.ui = SwaggerUIBundle({
          url: "./openapi.yaml",
          dom_id: "#swagger-ui",
          deepLinking: true,
          presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
          plugins: [SwaggerUIBundle.plugins.DownloadUrl],
          layout: "StandaloneLayout",
          docExpansion: "none",
          defaultModelsExpandDepth: 1,
        });

        const authBaseUrl = "https://mmhmtcotlirxhspeqhfh.supabase.co/auth/v1";
        const apiBaseUrl = "https://mmhmtcotlirxhspeqhfh.supabase.co/functions/v1/force-runner-api";
        const authPaths = new Set(["/signup", "/token", "/recover", "/logout"]);

        function fullUrlForPath(path) {
          const baseUrl = authPaths.has(path) ? authBaseUrl : apiBaseUrl;
          const query = path === "/token" ? "?grant_type=password" : "";
          return `${baseUrl}${path}${query}`;
        }

        function addCopyButtons() {
          document.querySelectorAll(".opblock-summary").forEach((summary) => {
            if (summary.querySelector(".copy-full-url")) return;

            const pathElement = summary.querySelector(".opblock-summary-path");
            const path = pathElement?.getAttribute("data-path") || pathElement?.textContent?.trim();
            if (!path) return;

            const button = document.createElement("button");
            button.type = "button";
            button.className = "copy-full-url";
            button.textContent = "Copiar URL";
            button.addEventListener("click", async (event) => {
              event.preventDefault();
              event.stopPropagation();

              await navigator.clipboard.writeText(fullUrlForPath(path));
              button.textContent = "Copiada";
              button.classList.add("copied");

              window.setTimeout(() => {
                button.textContent = "Copiar URL";
                button.classList.remove("copied");
              }, 1400);
            });

            summary.insertBefore(button, summary.querySelector(".authorization__btn"));
          });
        }

        const observer = new MutationObserver(addCopyButtons);
        observer.observe(document.getElementById("swagger-ui"), { childList: true, subtree: true });
        addCopyButtons();
      };
    </script>
  </body>
</html>
