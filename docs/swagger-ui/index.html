<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Force Runner API Docs</title>
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5.17.14/swagger-ui.css" />
    <style>
      body {
        margin: 0;
        background: #f6f8fa;
      }

      .topbar {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="swagger-ui"></div>
    <script src="https://unpkg.com/swagger-ui-dist@5.17.14/swagger-ui-bundle.js"></script>
    <script src="https://unpkg.com/swagger-ui-dist@5.17.14/swagger-ui-standalone-preset.js"></script>
    <script>
      window.onload = function () {
        window.ui = SwaggerUIBundle({
          url: "./openapi.yaml?v=20260621-2",
          dom_id: "#swagger-ui",
          deepLinking: true,
          presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
          plugins: [SwaggerUIBundle.plugins.DownloadUrl],
          layout: "StandaloneLayout",
          docExpansion: "none",
          defaultModelsExpandDepth: 1,
          tagsSorter: function (left, right) {
            const order = [
              "Auth",
              "Perfil",
              "Carrera",
              "Historial",
              "Amigos",
              "Reacciones",
              "Chat",
              "Notificaciones",
              "Coach IA",
            ];
            return order.indexOf(left) - order.indexOf(right);
          },
        });

        const authBaseUrl = "https://mmhmtcotlirxhspeqhfh.supabase.co/auth/v1";
        const apiBaseUrl = "https://mmhmtcotlirxhspeqhfh.supabase.co/functions/v1/force-runner-api-v2";
        const authPaths = new Set(["/signup", "/token", "/recover", "/logout"]);

        function buildFullUrl(path) {
          const baseUrl = authPaths.has(path) ? authBaseUrl : apiBaseUrl;
          const query = path === "/token" ? "?grant_type=password" : "";
          return `${baseUrl}${path}${query}`;
        }

        const originalWriteText = navigator.clipboard.writeText.bind(navigator.clipboard);
        navigator.clipboard.writeText = function (text) {
          const trimmedText = String(text).trim();

          if (trimmedText.startsWith("/") && !trimmedText.startsWith("//")) {
            return originalWriteText(buildFullUrl(trimmedText));
          }

          return originalWriteText(trimmedText);
        };

        document.addEventListener(
          "click",
          function (event) {
            const copyButton = event.target.closest(".copy-to-clipboard");
            if (!copyButton) return;

            const operation = copyButton.closest(".opblock");
            const pathElement = operation?.querySelector(".opblock-summary-path");
            const path = pathElement?.getAttribute("data-path") || pathElement?.textContent?.trim();

            if (!path || !path.startsWith("/") || path.startsWith("//")) return;

            event.preventDefault();
            event.stopPropagation();
            event.stopImmediatePropagation();
            originalWriteText(buildFullUrl(path));
          },
          true
        );
      };
    </script>
  </body>
</html>
