openapi: 3.0.3
info:
  title: Force Runner API
  version: "1.0.0"
  description: |
    Documentacion formal de las APIs personalizadas de Force Runner.
    Estas APIs se ejecutan como Supabase Edge Function y requieren usuario autenticado.
  contact:
    name: Equipo Force Runner
servers:
  - url: https://mmhmtcotlirxhspeqhfh.supabase.co/functions/v1/force-runner-api
    description: Supabase Edge Function - Force Runner API
  - url: https://mmhmtcotlirxhspeqhfh.supabase.co/auth/v1
    description: Supabase Auth API
tags:
  - name: Auth
    description: Autenticacion gestionada por Supabase Auth
  - name: Carrera
    description: Inicio, finalizacion y cancelacion de carreras
  - name: Amigos
    description: Solicitudes de amistad y ranking de amigos
  - name: Reacciones
    description: Reacciones sobre carreras o actividades
  - name: Chat
    description: Mensajes entre amigos
  - name: Perfil
    description: Perfil del usuario autenticado
  - name: Historial
    description: Historial, detalle y estadisticas de carreras
  - name: Notificaciones
    description: Notificaciones internas a amigos
  - name: Coach IA
    description: Consultas del asistente de entrenamiento
security:
  - ApiKeyAuth: []
    BearerAuth: []
paths:
  /signup:
    post:
      tags:
        - Auth
      summary: Crear nueva cuenta
      description: |
        Crea una cuenta nueva usando Supabase Auth.
        Los datos adicionales viajan en `data` y el trigger de base de datos crea el perfil publico,
        datos privados, preferencias y aceptacion de terminos.
      operationId: signUp
      servers:
        - url: https://mmhmtcotlirxhspeqhfh.supabase.co/auth/v1
          description: Supabase Auth API
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignUpRequest"
            example:
              email: nuevo.usuario@forcerunner.test
              password: ForceRunner123!
              data:
                full_name: NUEVO USUARIO FORCE RUNNER
                display_name: Nuevo Usuario
                country: Honduras
                avatar_url: profile-images/nuevo-usuario/avatar.jpg
                phone: "+50490000009"
                age: 22
                weight_kg: 70
                accepted_terms: true
                terms_version: "1.0"
      responses:
        "200":
          description: Cuenta creada correctamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
  /token:
    post:
      tags:
        - Auth
      summary: Iniciar sesion
      description: |
        Obtiene `access_token` usando correo y contrasena.

        URL completa:

        `https://mmhmtcotlirxhspeqhfh.supabase.co/auth/v1/token?grant_type=password`
      operationId: signIn
      servers:
        - url: https://mmhmtcotlirxhspeqhfh.supabase.co/auth/v1
          description: Supabase Auth API
      security:
        - ApiKeyAuth: []
      parameters:
        - name: grant_type
          in: query
          required: true
          schema:
            type: string
            enum:
              - password
          example: password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            example:
              email: edwin@forcerunner.test
              password: ForceRunner123!
      responses:
        "200":
          description: Login correcto
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
  /recover:
    post:
      tags:
        - Auth
      summary: Recuperar contrasena
      description: Envia correo de recuperacion de contrasena al usuario registrado.
      operationId: recoverPassword
      servers:
        - url: https://mmhmtcotlirxhspeqhfh.supabase.co/auth/v1
          description: Supabase Auth API
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecoverPasswordRequest"
            example:
              email: edwin@forcerunner.test
      responses:
        "200":
          description: Solicitud de recuperacion recibida
          content:
            application/json:
              schema:
                type: object
        "400":
          $ref: "#/components/responses/BadRequest"
  /logout:
    post:
      tags:
        - Auth
      summary: Cerrar sesion
      description: Cierra la sesion del usuario autenticado.
      operationId: logout
      servers:
        - url: https://mmhmtcotlirxhspeqhfh.supabase.co/auth/v1
          description: Supabase Auth API
      security:
        - ApiKeyAuth: []
          BearerAuth: []
      responses:
        "204":
          description: Sesion cerrada correctamente
        "401":
          $ref: "#/components/responses/Unauthorized"
  /start-run:
    post:
      tags:
        - Carrera
      summary: Iniciar carrera
      description: Crea una actividad indicando que el usuario comenzo a correr y notifica a sus amigos.
      operationId: startRun
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartRunRequest"
            example:
              latitude: 14.0818
              longitude: -87.2068
      responses:
        "200":
          description: Carrera iniciada correctamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartRunResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /finish-run:
    post:
      tags:
        - Carrera
      summary: Finalizar carrera
      description: Guarda una carrera, sus puntos GPS, crea actividad social y notifica a los amigos.
      operationId: finishRun
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FinishRunRequest"
            example:
              duration_seconds: 2700
              distance_meters: 6320
              pace_seconds_per_km: 427
              calories: 512
              mood: feliz
              points:
                - latitude: 14.0818
                  longitude: -87.2068
                  recorded_at: "2026-06-21T12:00:00Z"
      responses:
        "200":
          description: Carrera finalizada correctamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinishRunResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /cancel-run:
    post:
      tags:
        - Carrera
      summary: Cancelar carrera
      description: Crea una actividad indicando que el usuario dejo de correr y notifica a sus amigos.
      operationId: cancelRun
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelRunRequest"
            example:
              reason: Usuario detuvo la carrera
      responses:
        "200":
          description: Carrera cancelada correctamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelRunResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /create-friend-request:
    post:
      tags:
        - Amigos
      summary: Crear solicitud de amistad
      description: Crea una solicitud de amistad pendiente hacia otro usuario.
      operationId: createFriendRequest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFriendRequest"
            example:
              addressee_id: 11111111-1111-4111-8111-111111111111
      responses:
        "200":
          description: Solicitud de amistad creada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FriendshipResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /respond-friend-request:
    post:
      tags:
        - Amigos
      summary: Responder solicitud de amistad
      description: Permite aceptar o rechazar una solicitud de amistad recibida.
      operationId: respondFriendRequest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RespondFriendRequest"
            example:
              friendship_id: aaaaaaaa-0001-4000-8000-000000000001
              status: accepted
      responses:
        "200":
          description: Solicitud respondida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FriendshipResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /friend-ranking:
    get:
      tags:
        - Amigos
      summary: Ranking de amigos
      description: Devuelve el ranking del usuario autenticado y sus amigos aceptados.
      operationId: getFriendRanking
      parameters:
        - name: period
          in: query
          required: false
          schema:
            type: string
            enum:
              - month
              - week
            default: month
          example: month
      responses:
        "200":
          description: Ranking de amigos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FriendRankingResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /search-users:
    get:
      tags:
        - Amigos
      summary: Buscar usuarios
      description: Busca usuarios por nombre visible, correo o telefono. Solo devuelve datos publicos y estado de amistad.
      operationId: searchUsers
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
            minLength: 2
          example: astrid
      responses:
        "200":
          description: Usuarios encontrados
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchUsersResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /my-friends:
    get:
      tags:
        - Amigos
      summary: Listar mis amigos
      description: Devuelve los amigos aceptados del usuario autenticado.
      operationId: getMyFriends
      responses:
        "200":
          description: Amigos aceptados
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyFriendsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /friend-requests:
    get:
      tags:
        - Amigos
      summary: Solicitudes de amistad
      description: Devuelve solicitudes pendientes recibidas y enviadas.
      operationId: getFriendRequests
      responses:
        "200":
          description: Solicitudes pendientes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FriendRequestsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /send-reaction:
    post:
      tags:
        - Reacciones
      summary: Enviar reaccion
      description: Crea o actualiza una reaccion del usuario autenticado sobre una carrera o actividad.
      operationId: sendReaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendReactionRequest"
            example:
              target_type: run
              target_id: bbbbbbbb-0001-4000-8000-000000000001
              reaction_type: fire
      responses:
        "200":
          description: Reaccion guardada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReactionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /get-reactions:
    get:
      tags:
        - Reacciones
      summary: Ver reacciones
      description: Devuelve las reacciones y perfiles de quienes reaccionaron sobre una carrera o actividad.
      operationId: getReactions
      parameters:
        - name: target_type
          in: query
          required: true
          schema:
            type: string
            enum:
              - run
              - activity
          example: run
        - name: target_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
          example: bbbbbbbb-0001-4000-8000-000000000001
      responses:
        "200":
          description: Reacciones encontradas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetReactionsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /send-message:
    post:
      tags:
        - Chat
      summary: Enviar mensaje
      description: Envia un mensaje a un amigo aceptado. Si no existe conversacion, la crea.
      operationId: sendMessage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
            example:
              recipient_user_id: 11111111-1111-4111-8111-111111111111
              body: Listo para correr?
      responses:
        "200":
          description: Mensaje enviado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendMessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /conversations:
    get:
      tags:
        - Chat
      summary: Listar conversaciones
      description: Devuelve las conversaciones del usuario autenticado con el perfil publico del amigo.
      operationId: getConversations
      responses:
        "200":
          description: Conversaciones del usuario
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /messages:
    get:
      tags:
        - Chat
      summary: Listar mensajes
      description: Devuelve los mensajes de una conversacion donde participa el usuario autenticado.
      operationId: getMessages
      parameters:
        - name: conversation_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Mensajes de la conversacion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessagesResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /me:
    get:
      tags:
        - Perfil
      summary: Ver mi perfil
      description: Devuelve perfil publico, datos privados y preferencias del usuario autenticado.
      operationId: getMe
      responses:
        "200":
          description: Perfil del usuario autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    patch:
      tags:
        - Perfil
      summary: Actualizar mi perfil
      description: Actualiza datos permitidos del perfil, datos privados y preferencias.
      operationId: updateMe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMeRequest"
            example:
              display_name: Edwin Torres
              country: Honduras
              phone: "+50490000001"
              age: 24
              weight_kg: 75
              theme: light
              notifications_enabled: true
      responses:
        "200":
          description: Perfil actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /run-history:
    get:
      tags:
        - Historial
      summary: Historial de carreras
      description: Devuelve las carreras guardadas del usuario autenticado.
      operationId: getRunHistory
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: Historial de carreras
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunHistoryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /run-detail:
    get:
      tags:
        - Historial
      summary: Detalle de carrera
      description: Devuelve una carrera propia con sus puntos GPS.
      operationId: getRunDetail
      parameters:
        - name: run_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Detalle de carrera
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunDetailResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /statistics:
    get:
      tags:
        - Historial
      summary: Estadisticas
      description: Devuelve estadisticas semanales o mensuales del usuario autenticado.
      operationId: getStatistics
      parameters:
        - name: period
          in: query
          required: false
          schema:
            type: string
            enum:
              - week
              - month
            default: month
      responses:
        "200":
          description: Estadisticas del usuario
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatisticsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /notify-friends:
    post:
      tags:
        - Notificaciones
      summary: Notificar amigos
      description: Crea notificaciones internas para todos los amigos aceptados del usuario autenticado.
      operationId: notifyFriends
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotifyFriendsRequest"
            example:
              type: friend_started_running
              title: Edwin comenzo a correr
              body: Enviale apoyo y motivacion
              related_table: activities
              related_id: cccccccc-0001-4000-8000-000000000001
      responses:
        "200":
          description: Amigos notificados
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotifyFriendsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /notifications:
    get:
      tags:
        - Notificaciones
      summary: Listar notificaciones
      description: Devuelve notificaciones internas del usuario autenticado.
      operationId: getNotifications
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 30
            maximum: 100
      responses:
        "200":
          description: Notificaciones del usuario
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /mark-notification-read:
    post:
      tags:
        - Notificaciones
      summary: Marcar notificacion como leida
      description: Marca como leida una notificacion propia.
      operationId: markNotificationRead
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkNotificationReadRequest"
            example:
              notification_id: dddddddd-0001-4000-8000-000000000001
      responses:
        "200":
          description: Notificacion actualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /coach-ai:
    post:
      tags:
        - Coach IA
      summary: Consultar Coach IA
      description: Guarda una pregunta del usuario y devuelve una respuesta base del Coach IA.
      operationId: coachAi
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CoachAiRequest"
            example:
              input_type: text
              question: Cuanto debo correr para quemar 500 calorias?
              calories_goal: 500
      responses:
        "200":
          description: Respuesta del Coach IA
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoachAiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: apikey
      description: Publishable key de Supabase.
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Access token obtenido desde Supabase Auth.
  responses:
    BadRequest:
      description: Solicitud invalida o error de validacion
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            ok: false
            error: question es obligatorio
    Unauthorized:
      description: Token ausente, invalido o expirado
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            ok: false
            error: Token no valido
  schemas:
    ApiResponse:
      type: object
      required:
        - ok
        - data
      properties:
        ok:
          type: boolean
          example: true
        data:
          type: object
    ErrorResponse:
      type: object
      required:
        - ok
        - error
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          example: Error inesperado
    SignUpRequest:
      type: object
      required:
        - email
        - password
        - data
      properties:
        email:
          type: string
          format: email
          example: nuevo.usuario@forcerunner.test
        password:
          type: string
          format: password
          minLength: 8
          example: ForceRunner123!
        data:
          type: object
          required:
            - full_name
            - display_name
            - country
            - avatar_url
            - phone
            - age
            - weight_kg
            - accepted_terms
            - terms_version
          properties:
            full_name:
              type: string
              example: NUEVO USUARIO FORCE RUNNER
            display_name:
              type: string
              example: Nuevo Usuario
            country:
              type: string
              example: Honduras
            avatar_url:
              type: string
              example: profile-images/nuevo-usuario/avatar.jpg
            phone:
              type: string
              example: "+50490000009"
            age:
              type: integer
              minimum: 10
              maximum: 100
              example: 22
            weight_kg:
              type: number
              minimum: 25
              maximum: 300
              example: 70
            accepted_terms:
              type: boolean
              example: true
            terms_version:
              type: string
              example: "1.0"
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: edwin@forcerunner.test
        password:
          type: string
          format: password
          example: ForceRunner123!
    RecoverPasswordRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
          example: edwin@forcerunner.test
    AuthResponse:
      type: object
      properties:
        access_token:
          type: string
          description: Token JWT para usar en BearerAuth.
        token_type:
          type: string
          example: bearer
        expires_in:
          type: integer
          example: 3600
        refresh_token:
          type: string
        user:
          $ref: "#/components/schemas/AuthUser"
    AuthUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        phone:
          type: string
          nullable: true
        aud:
          type: string
          example: authenticated
        role:
          type: string
          example: authenticated
        user_metadata:
          type: object
    StartRunRequest:
      type: object
      properties:
        latitude:
          type: number
          format: double
          example: 14.0818
        longitude:
          type: number
          format: double
          example: -87.2068
    StartRunResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponse"
        - type: object
          properties:
            data:
              type: object
              properties:
                activity:
                  $ref: "#/components/schemas/Activity"
                notifications_created:
                  type: integer
                  example: 3
    FinishRunRequest:
      type: object
      required:
        - duration_seconds
        - distance_meters
      properties:
        started_at:
          type: string
          format: date-time
