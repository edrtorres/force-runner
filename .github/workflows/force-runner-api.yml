name: Force Runner API

on:
  push:
    paths:
      - "supabase/functions/force-runner-api/**"
      - ".github/workflows/force-runner-api.yml"
  pull_request:
    paths:
      - "supabase/functions/force-runner-api/**"
      - ".github/workflows/force-runner-api.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run tests
        run: deno test supabase/functions/force-runner-api/tests
